  <!-- Text "Exceeding Expectation" -->
  <text x="123" y="115" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" letter-spacing="4">E<tspan font-weight="normal" fill="#cbd5e1">xceeding </tspan>E<tspan font-weight="normal" fill="#cbd5e1">xpectation</tspan></text>
  
</svg>
