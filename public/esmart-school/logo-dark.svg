    <path d="M 95 82 C 95 50 78 43 60 43 C 40 43 22 58 22 82 C 22 108 40 123 60 123 C 78 123 90 112 95 97" fill="none" stroke="#e88100" stroke-width="12" stroke-linecap="butt" />

